<!doctype html>
<html lang="en">
  <head>
    <title>check-in-shuttle-buses-ui</title>
    <meta charset="utf-8" />
    <meta name="description" content="description" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#00b140" />
    <link rel="apple-touch-icon" href="<%= PUBLIC_URL %>/apple-touch-icon.png" />
    <link rel="shortcut icon" href="<%= PUBLIC_URL %>/favicon.ico" />
    <link rel="manifest" href="<%= PUBLIC_URL %>/manifest.json" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      /* Initial loading overlay — removed by React after mount */
      #app-loading {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #app-loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #00B14F;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div id="app-loading-spinner"></div>
    </div>
    <div id="root"></div>
    <noscript>Please enable JavaScript first.</noscript>
  </body>
</html>
